name: Rust Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test And Tool Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Format check
        run: cargo fmt --check

      - name: Unit and integration tests
        run: cargo test

      - name: Print tool inventory
        run: |
          set -euo pipefail
          cargo run --bin google-admin-mcp -- --print-tools > /tmp/tools.json
          test -s /tmp/tools.json
